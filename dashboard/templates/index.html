<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PromptShield — Detections</title>

  <!--
    MVP frontend, zero build step:
      * Tailwind via the Play CDN (fine for an MVP / internal tool — swap for a
        compiled stylesheet before any production/high-traffic use).
      * HTMX drives the live updates: the table and stats containers poll their
        fragment endpoints on a timer, so no custom JS and no full-page reloads.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    // Register a subtle red accent palette used for "blocked" emphasis.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { 500: "#ef4444", 600: "#dc2626", 700: "#b91c1c" },
          },
          fontFamily: {
            mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
          },
        },
      },
    };
  </script>
  <style>
    /* Hide HTMX loading indicators until a request is in flight. */
    .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { opacity: 1; }
    /* Thin, dark scrollbars to match the theme. */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 6px; }
  </style>
</head>

<body class="h-full bg-slate-950 text-slate-200 font-sans antialiased">

  <!-- ── Top navbar ─────────────────────────────────────────────────────── -->
  <header class="border-b border-slate-800/80 bg-slate-900/60 backdrop-blur sticky top-0 z-20">
    <div class="mx-auto max-w-screen-2xl px-6 py-3 flex items-center gap-3">
      <!-- Shield glyph -->
      <span class="grid h-9 w-9 place-items-center rounded-lg bg-accent-600/15 ring-1 ring-accent-600/40">
        <svg class="h-5 w-5 text-accent-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6l7-3z" stroke-linejoin="round"/>
        </svg>
      </span>
      <div class="flex items-baseline gap-2">
        <span class="text-lg font-semibold tracking-tight text-white">PromptShield</span>
        <span class="text-xs font-medium uppercase tracking-widest text-slate-500">DLP</span>
      </div>

      <nav class="ml-8 hidden gap-6 text-sm md:flex">
        <a class="font-medium text-white" href="/">Detections</a>
        <a class="text-slate-400 hover:text-slate-200" href="/api/detections" target="_blank">API</a>
      </nav>

      <!-- Live indicator -->
      <div class="ml-auto flex items-center gap-2 text-xs text-slate-400">
        <span class="relative flex h-2 w-2">
          <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-500 opacity-75"></span>
          <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-500"></span>
        </span>
        Live · polling every 2.5s
      </div>
    </div>
  </header>

  <!-- ── Body: sidebar + main ───────────────────────────────────────────── -->
  <div class="mx-auto max-w-screen-2xl px-6 py-6 grid grid-cols-1 gap-6 lg:grid-cols-[18rem_minmax(0,1fr)]">

    <!-- Sidebar: live stats + filters -->
    <aside class="space-y-6">
      <!-- Stats: polled fragment. First paint via hx-trigger="load". -->
      <section
        id="stats"
        hx-get="/fragments/stats"
        hx-trigger="load, every 2.5s"
        hx-swap="innerHTML">
        <!-- _stats.html is swapped in here -->
        <div class="animate-pulse space-y-3">
          <div class="h-20 rounded-xl bg-slate-900"></div>
          <div class="h-20 rounded-xl bg-slate-900"></div>
          <div class="h-20 rounded-xl bg-slate-900"></div>
        </div>
      </section>

      <!-- Filters. Changing a select re-queries the table immediately AND is
           included on every poll via hx-include, so live updates stay filtered. -->
      <section class="rounded-xl border border-slate-800 bg-slate-900/40 p-4">
        <h2 class="mb-3 text-xs font-semibold uppercase tracking-widest text-slate-500">Filters</h2>

        <label class="mb-1 block text-xs text-slate-400">Provider</label>
        <select name="provider"
                class="mb-4 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 focus:border-accent-500 focus:outline-none"
                hx-get="/fragments/table"
                hx-target="#table"
                hx-include="[name='action']"
                hx-trigger="change">
          <option value="all">All providers</option>
          {% for p in providers %}
          <option value="{{ p }}">{{ p }}</option>
          {% endfor %}
        </select>

        <label class="mb-1 block text-xs text-slate-400">Action</label>
        <select name="action"
                class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 focus:border-accent-500 focus:outline-none"
                hx-get="/fragments/table"
                hx-target="#table"
                hx-include="[name='provider']"
                hx-trigger="change">
          <option value="all">All actions</option>
          {% for key, label in action_labels.items() %}
          <option value="{{ key }}">{{ label }}</option>
          {% endfor %}
        </select>
      </section>
    </aside>

    <!-- Main: detections table -->
    <main class="min-w-0">
      <div class="mb-4 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold text-white">Detections</h1>
          <p class="text-sm text-slate-500">Captured GenAI prompts and DLP decisions, newest first.</p>
        </div>
        <!-- Loading indicator (shown while the table poll is in flight). -->
        <span class="htmx-indicator flex items-center gap-2 text-xs text-slate-400">
          <svg class="h-4 w-4 animate-spin text-accent-500" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
          </svg>
          Refreshing…
        </span>
      </div>

      <!-- Table: polled fragment. Filters travel along via hx-include. -->
      <div
        id="table"
        class="overflow-hidden rounded-xl border border-slate-800 bg-slate-900/40"
        hx-get="/fragments/table"
        hx-trigger="load, every 2.5s"
        hx-include="[name='provider'], [name='action']"
        hx-swap="innerHTML">
        <!-- _table.html is swapped in here -->
        <div class="p-10 text-center text-sm text-slate-500">Loading detections…</div>
      </div>
    </main>
  </div>

  <!-- Modal mount point. Row clicks load _detail.html in here; the modal's own
       close button / backdrop clears it again. -->
  <div id="modal"></div>

</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detector replay tests
        run: python tests/test_detector.py

      - name: DLP smoke tests
        run: python tests/test_dlp.py

      - name: Overlay injection + block-response tests
        run: python tests/test_overlay.py